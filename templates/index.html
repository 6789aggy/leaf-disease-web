{% extends "base.html" %}

{% block content %}

<div class="row">
    <div class="col-md-8">
        <div class="card bg-dark text-white shadow">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Camera trực tiếp (iVCam)</span>

                <a href="/capture_manual" class="btn btn-warning btn-sm">
                    Chụp thủ công
                </a>
            </div>

            <div class="card-body text-center">
                <img src="{{ url_for('video_feed') }}" class="img-fluid rounded camera-feed">
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card stat-card mb-3">
            <div class="card-body">
                <h4>Tổng phát hiện</h4>
                <h2>{{ total }}</h2>
            </div>
        </div>

        <div class="card danger-card mb-3">
            <div class="card-body">
                <h4>Bệnh nguy cơ cao</h4>
                <h2>{{ high }}</h2>
            </div>
        </div>

        <div class="card success-card">
            <div class="card-body">
                <h4>Bệnh phổ biến</h4>
                <h5>{{ top_disease }}</h5>
            </div>
        </div>
    </div>
</div>

{% endblock %}
